<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Analíticos</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    
    <style>
        body { background: #050508; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding-top: 50px; }
        .container { width: 100%; max-width: 400px; text-align: center; background: #111; padding: 40px; border-radius: 10px; border: 1px solid #333; }
        input { width: 90%; padding: 12px; margin: 20px 0; border-radius: 5px; border: 1px solid #444; background: #1a1a1a; color: white; text-align: center; font-size: 16px; }
        button { padding: 12px 30px; margin: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .btn-consultar { background: #D4AF37; color: black; }
        .btn-descarga { background: #2563eb; color: white; display: none; }
        .btn-salir { background: #444; color: white; }
    </style>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD47_2UtWLFI_VRVvvXVAqn4zZzZ4d1ggo",
            authDomain: "av-clinica-convergencia.firebaseapp.com",
            databaseURL: "https://av-clinica-convergencia-default-rtdb.firebaseio.com",
            projectId: "av-clinica-convergencia",
            storageBucket: "av-clinica-convergencia.firebasestorage.app",
            messagingSenderId: "939404425675",
            appId: "1:939404425675:web:8cfae157099efabd741e4e"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        const links = {
            "RIOS Graciela": "https://drive.google.com/drive/folders/1da5V0BKy4FghsOCz7B66mNOz7ZTFMKt5?usp=drive_link",
            "SCHWAB Gisela": "https://drive.google.com/drive/folders/1xDl_o19beXQrXMo4AdLBF4TWmEHkqwYb?usp=drive_link",
            "STEFANINI BENZO Romina": "https://drive.google.com/drive/folders/1PioVY2n5eJp7W1-c-yLqVzHkiXfNbEzh?usp=drive_link",
            "RODRIGUEZ Ramiro": "https://drive.google.com/drive/folders/1kixAS7AqD1zr3pDYKC4mjBBW0sqNimx0?usp=drive_link",
            "CAON Federico": "https://drive.google.com/drive/folders/1LnnPq0w7P81ShMJsG3MNoLkfhktakV6v?usp=drive_link",
            "PRAVAZ Emilia": "https://drive.google.com/drive/folders/1S9em-SWYKJcDn_ntTBznWgviHVjP5x5n?usp=sharing"
        };

        async function consultar() {
            const nombreInput = document.getElementById('nombreInput').value.trim();
            const res = document.getElementById('resultado');
            const btn = document.getElementById('btnDescarga');

            res.innerText = "Consultando...";
            btn.style.display = "none";

            try {
                // Consulta total de la colección para evitar error de índices de Firebase
                const snapshot = await db.collection("visado_analítico").get();
                
                // Filtramos en memoria
                const alumnoEncontrado = snapshot.docs.find(doc => doc.data().estudiante === nombreInput);

                if (alumnoEncontrado && links[nombreInput]) {
                    res.innerText = "Su analítico ya se encuentra generado, vaya al botón de descarga";
                    res.style.color = "#22c55e";
                    btn.style.display = "inline-block";
                    btn.onclick = () => window.open(links[nombreInput], '_blank');
                } else {
                    res.innerText = "No se encontraron datos de analítico, comunicarse con Dirección";
                    res.style.color = "#ef4444";
                }
            } catch (e) {
                res.innerText = "Error de conexión: " + e.message;
            }
        }
    </script>
</head>
<body>
    <img src="visanal.png" alt="Visado" style="width: 180px; margin-bottom: 30px;">
    <div class="container">
        <h3>Consulta de Analítico</h3>
        <input type="text" id="nombreInput" placeholder="Rios Graciela">
        <br>
        <button class="btn-consultar" onclick="consultar()">Consultar analítico</button>
        <p id="resultado"></p>
        <button id="btnDescarga" class="btn-descarga">Descarga PDF</button>
        <button class="btn-salir" onclick="window.close()">Salir</button>
    </div>
</body>
</html>
